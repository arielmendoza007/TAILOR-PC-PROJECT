<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Tailor-PC | Consultoría Experta</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        /* VARIABLES PARA MODO CLARO/OSCURO */
        :root {
            --bg-color: #f8f9fa;
            --text-color: #212529;
            --card-bg: #ffffff;
            --input-bg: #ffffff;
            --input-text: #212529;
            --border-color: #dee2e6;
        }

        [data-theme="dark"] {
            --bg-color: #1a1d20;
            --text-color: #e9ecef;
            --card-bg: #2b3035;
            --input-bg: #343a40;
            --input-text: #ffffff;
            --border-color: #495057;
        }

        body { 
            background-color: var(--bg-color); 
            color: var(--text-color); 
            font-family: 'Segoe UI', sans-serif; 
            transition: 0.3s; 
        }

        .card { 
            background-color: var(--card-bg); 
            border: none; 
            border-radius: 15px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); 
        }

        .form-control, .form-select { 
            background-color: var(--input-bg); 
            border: 1px solid var(--border-color); 
            color: var(--input-text); 
        }

        .form-control:focus, .form-select:focus { 
            background-color: var(--input-bg); 
            color: var(--input-text); 
        }

        .btn-toggle {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 1000;
        }

        label { font-weight: 500; margin-bottom: 8px; opacity: 0.8; }
    </style>
</head>
<body data-theme="dark"> <button class="btn btn-outline-info btn-toggle" onclick="toggleTheme()">🌓 Cambiar Tema</button>

    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card p-5">
                    <h1 class="text-center mb-2">Bienvenido a Tailor-PC</h1>
                    <p class="text-center text-muted mb-4">Configura tu equipo ideal con inteligencia experta</p>
                    <hr class="mb-4" style="opacity: 0.1;">
                    
                    <form action="/diagnostico" method="POST">
                        <div id="step-1" class="form-step">
                            <h3>Paso 1: ¿Cuál es tu presupuesto?</h3>
                            <input type="number" id="p_input" name="presupuesto" class="form-control" placeholder="Ej. 15000" required>
                            <button type="button" onclick="nextStep(2)" class="btn btn-primary mt-3">Siguiente</button>
                        </div>

                        <div id="step-2" class="form-step" style="display:none;">
                            <h3>Paso 2: Uso principal del equipo</h3>
                            <div class="row">
                                <div class="col-md-6 mb-4">
                                    <label>¿Necesitas Wi-Fi o Bluetooth?</label>
                                    <select name="wifi" class="form-select">
                                        <option value="SI">Sí, los necesito integrados</option>
                                        <option value="NO">No, uso cable de red</option>
                                    </select>
                                </div>
                                <div class="col-md-6 mb-4">
                                    <label>Tipo de Uso Detallado:</label>
                                    <select name="uso" class="form-select">
                                        <option value="gaming">Gaming Competitivo</option>
                                        <option value="diseno">Diseño Gráfico (Adobe/Corel)</option>
                                        <option value="render">Edición de Video / Render 3D</option>
                                        <option value="ofimatica">Ofimática y Navegación</option>
                                    </select>
                                </div>
                            </div>

                            <div class="row mt-4">
                                <div class="col-md-6 mb-4">
                                    <label>Tamaño de gabinete preferido:</label>
                                    <select name="size" class="form-select">
                                        <option value="ATX">Torre Grande (ATX)</option>
                                        <option value="Micro-ATX">Compacta (Micro-ATX)</option>
                                    </select>
                                </div>
                            </div>

                            <button type="button" onclick="nextStep(3)" class="btn btn-primary mt-3">Siguiente</button>
                        </div>

                        <div id="step-3" class="form-step" style="display:none;">
                            <div class="row">
                                <div class="col-md-6 mb-4">
                                    <label>Resolución Objetivo:</label>
                                    <select name="resolucion" class="form-select">
                                        <option value="1080p">1080p (Estándar)</option>
                                        <option value="1440p">1440p (2K)</option>
                                        <option value="4K">4K (Ultra HD)</option>
                                    </select>
                                </div>
                                <div class="col-md-6 mb-4">
                                    <label>¿Zona de clima cálido?</label>
                                    <select name="clima" class="form-select">
                                        <option value="templado">No, clima templado/frío</option>
                                        <option value="calido">Sí, zona calurosa</option>
                                    </select>
                                </div>
                            </div>

                            <div class="row">
                                <div class="col-md-6 mb-4">
                                    <label>¿Planeas actualizar en 2 años?</label>
                                    <select name="longevidad" class="form-select">
                                        <option value="SI">Sí, quiero que dure (AM5/DDR5)</option>
                                        <option value="NO">No, busco lo mejor por mi dinero hoy</option>
                                    </select>
                                </div>
                                <div class="col-md-6 mb-4">
                                    <label>Prioridad de Almacenamiento:</label>
                                    <select name="almacenamiento" class="form-select">
                                        <option value="velocidad">Velocidad (NVMe Gen4)</option>
                                        <option value="capacidad">Capacidad (2TB+)</option>
                                    </select>
                                </div>
                            </div>

                            <div class="mb-4">
                                <label class="d-block mb-3">Prioridad de Diseño:</label>
                                <div class="btn-group w-100" role="group">
                                    <input type="radio" class="btn-check" name="prioridad" id="rend" value="rendimiento" checked>
                                    <label class="btn btn-outline-primary" for="rend">Rendimiento Puro</label>
                                    
                                    <input type="radio" class="btn-check" name="prioridad" id="est" value="estetica">
                                    <label class="btn btn-outline-primary" for="est">Estética / RGB</label>
                                </div>
                            </div>

                            <div class="form-check form-switch mb-4">
                                <input class="form-check-input" type="checkbox" name="streaming" id="stream">
                                <label class="form-check-label" for="stream">¿Harás Streaming o Creación de Contenido?</label>
                            </div>

                            <button type="submit" class="btn btn-primary btn-lg w-100 mt-2">Comenzar Diagnóstico</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script>
        function toggleTheme() {
            const body = document.body;
            const current = body.getAttribute('data-theme');
            const target = current === 'dark' ? 'light' : 'dark';
            body.setAttribute('data-theme', target);
        }

        function nextStep(step) {
            document.querySelectorAll('.form-step').forEach(div => div.style.display = 'none');
            document.getElementById('step-' + step).style.display = 'block';
        }
    </script>

    <div id="chatbot-container" style="position: fixed; bottom: 20px; left: 20px; z-index: 2000;">
    <button class="btn btn-dark rounded-circle p-3 shadow" onclick="toggleChat()">🤖</button>
    <div id="chat-window" class="card shadow" style="display:none; width: 320px; position: absolute; bottom: 70px; left: 0;">
        <div class="card-header bg-primary text-white">Asistente Experto Tailor-PC</div>
        <div class="card-body">
            <div id="chat-response" class="mb-3 small p-2 bg-light rounded" style="min-height: 50px;">
                ¡Hola! Soy tu asistente de hardware. Hazme una pregunta o elige una opción:
            </div>
            <div class="d-grid gap-2 mb-3">
                <button class="btn btn-outline-primary btn-sm" onclick="askChat('¿Qué es el cuello de botella?')">¿Qué es el cuello de botella?</button>
                <button class="btn btn-outline-primary btn-sm" onclick="askChat('¿Qué es el TDP?')">¿Qué es el TDP?</button>
                <button class="btn btn-outline-primary btn-sm" onclick="askChat('¿Por qué importa la VRAM?')">¿Por qué importa la VRAM?</button>
            </div>
            <input type="text" id="chat-input" class="form-control" placeholder="Escribe tu duda aquí...">
        </div>
    </div>
</div>

<script>
function toggleChat() {
    const win = document.getElementById('chat-window');
    win.style.display = win.style.display === 'none' ? 'block' : 'none';
}

function askChat(query) {
    const responses = {
        "¿qué es el cuello de botella?": "Es cuando un componente (generalmente el CPU) limita el rendimiento real de otro (la GPU)[cite: 35].",
        "¿qué es el tdp?": "Es la potencia de diseño térmico. Indica cuánto calor genera un componente y cuánta energía consume[cite: 255].",
        "¿por qué importa la vram?": "Es la memoria de video. Es vital para cargar texturas en altas resoluciones como 4K[cite: 6]."
    };
    const q = query.toLowerCase();
    document.getElementById('chat-response').innerText = responses[q] || "Interesante pregunta. Como sistema experto, te sugiero revisar las compatibilidades técnicas[cite: 28].";
}

document.getElementById('chat-input').addEventListener('keypress', function(e) {
    if (e.key === 'Enter') {
        const q = this.value.toLowerCase();
        let res = "No entiendo esa parte técnica, ¿puedes repetirlo?";
        if(q.includes("tdp")) res = "El TDP es la potencia de diseño térmico de la CPU/GPU.";
        if(q.includes("vram")) res = "La VRAM es memoria de video; importa para texturas y resoluciones altas.";
        if(q.includes("botella")) res = "El cuello de botella ocurre cuando un componente limita el rendimiento de otro.";
        document.getElementById('chat-response').innerText = res;
    }
});

document.querySelector('select[name="uso"]').addEventListener('change', function() {
    if (this.value === 'render') {
        alert("Sugerencia de Experto: El Render 3D requiere un presupuesto mayor a $25,000 MXN para resultados óptimos.");
    }
});
</script>
</body>
</html>
