<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Tailor-PC | Diagnóstico</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body data-theme="light"> 
    <script>
        const savedTheme = localStorage.getItem('tailorTheme') || 'light';
        document.body.setAttribute('data-theme', savedTheme);
    </script>
    <button class="btn btn-outline-info shadow" style="position:fixed; top:20px; right:20px; z-index:1000;" onclick="toggleTheme()">🌓 Tema</button>

    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card p-5 position-relative shadow-lg border-0">
                    <h2 class="text-center mb-2 fw-bold text-primary">Parámetros del Sistema</h2>
                    <p class="text-center mb-4 text-muted">Ajuste de variables heurísticas</p>
                    
                    <form action="/diagnostico" method="POST" id="msform">
                        <div class="step-container" id="step1">
                            <h5 class="text-primary mb-3">PASO 1: Recursos y Marca</h5>
                            <label class="fw-bold">Presupuesto máximo (MXN):</label>
                            <input type="number" name="presupuesto" class="form-control mb-3 py-2" placeholder="Ej. 25000" min="3000" required>
                            
                            <label class="fw-bold">Preferencia de Procesador:</label>
                            <select name="marca_cpu" class="form-select mb-4 py-2">
                                <option value="indistinto">El mejor costo/beneficio (Recomendado)</option>
                                <option value="intel">Prefiero Intel Core</option>
                                <option value="amd">Prefiero AMD Ryzen</option>
                            </select>
                            <button type="button" class="btn btn-primary px-4 fw-bold" onclick="nextStep(2)">Siguiente</button>
                        </div>

                        <div class="step-container" id="step2" style="display:none;">
                            <h5 class="text-primary mb-3">PASO 2: Enfoque Táctico</h5>
                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label class="fw-bold">Uso Principal:</label>
                                    <select name="uso" class="form-select py-2">
                                        <option value="gaming">Gaming / Streaming</option>
                                        <option value="render">Renderizado / 3D</option>
                                        <option value="ofimatica">Ofimática / Estudio</option>
                                    </select>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label class="fw-bold">Estética del Equipo:</label>
                                    <select name="estilo_rgb" class="form-select py-2">
                                        <option value="minimalista">Minimalista (Sin luces)</option>
                                        <option value="rgb">Gamer (RGB Completo)</option>
                                    </select>
                                </div>
                            </div>
                            <button type="button" class="btn btn-outline-secondary px-4 fw-bold" onclick="nextStep(1)">Atrás</button>
                            <button type="button" class="btn btn-primary px-4 fw-bold" onclick="nextStep(3)">Siguiente</button>
                        </div>

                        <div class="step-container" id="step3" style="display:none;">
                            <h5 class="text-primary mb-3">PASO 3: Infraestructura</h5>
                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label class="fw-bold">Conectividad:</label>
                                    <select name="wifi" class="form-select py-2">
                                        <option value="SI">Wi-Fi Integrado</option>
                                        <option value="NO">Ethernet (Cable)</option>
                                    </select>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label class="fw-bold">Tamaño (Gabinete):</label>
                                    <select name="size" class="form-select py-2">
                                        <option value="ATX">ATX (Estándar)</option>
                                        <option value="Micro-ATX">Micro-ATX (Compacto)</option>
                                    </select>
                                </div>
                            </div>
                            <div class="form-check form-switch mb-4">
                                <input class="form-check-input" type="checkbox" name="streaming" id="streaming">
                                <label class="form-check-label fw-bold" for="streaming">Procesamiento de Streaming Simultáneo</label>
                            </div>
                            <button type="button" class="btn btn-outline-secondary px-4 fw-bold" onclick="nextStep(2)">Atrás</button>
                            <button type="button" class="btn btn-primary px-4 fw-bold" onclick="nextStep(4)">Siguiente</button>
                        </div>

                        <div class="step-container" id="step4" style="display:none;">
                            <h5 class="text-primary mb-3">PASO 4: Escalabilidad</h5>
                            <div class="row">
                                <div class="col-md-6 mb-4">
                                    <label class="fw-bold">Actualización a futuro:</label>
                                    <select name="longevidad" class="form-select py-2">
                                        <option value="SI">Plataforma Nueva (DDR5/AM5)</option>
                                        <option value="NO">Máximo rendimiento actual (DDR4)</option>
                                    </select>
                                </div>
                                <div class="col-md-6 mb-4">
                                    <label class="fw-bold">Audio:</label>
                                    <select name="audio" class="form-select py-2">
                                        <option value="estandar">Audio Estándar</option>
                                        <option value="pro">Audio de Alta Fidelidad</option>
                                    </select>
                                </div>
                            </div>
                            <button type="button" class="btn btn-outline-secondary px-4 fw-bold" onclick="nextStep(3)">Atrás</button>
                            <button type="submit" class="btn btn-success px-4 fw-bold shadow">EJECUTAR MOTOR RETE</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <div id="loading-overlay" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; z-index:9999; flex-direction:column; justify-content:center; align-items:center;">
        <div class="spinner-border text-primary mb-4" style="width: 3.5rem; height: 3.5rem; border-width: 0.25em;" role="status"></div>
        <h2 id="loading-text" class="fw-bold mb-4" style="letter-spacing: 1.5px; color: var(--text-main);">SINTETIZANDO DATOS</h2>
        <div id="loading-logs" class="text-start" style="width: 550px; max-width: 90%;"></div>
    </div>

    <script>
        function toggleTheme() {
            const body = document.body;
            const target = body.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
            body.setAttribute('data-theme', target);
            localStorage.setItem('tailorTheme', target);
        }

        function nextStep(step) {
            document.querySelectorAll('.step-container').forEach(div => div.style.display = 'none');
            document.getElementById('step' + step).style.display = 'block';
        }

        function hablarFemenino(texto) {
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel();
                const utterance = new SpeechSynthesisUtterance(texto);
                utterance.lang = 'es-MX';
                utterance.rate = 1.05;
                utterance.pitch = 1.3; 
                const voces = window.speechSynthesis.getVoices();
                const vozMujer = voces.find(v => v.lang.includes('es') && (v.name.includes('Sabina') || v.name.includes('Helena') || v.name.includes('Paulina') || v.name.includes('Google')));
                if(vozMujer) utterance.voice = vozMujer;
                window.speechSynthesis.speak(utterance);
            }
        }

        if ('speechSynthesis' in window) { window.speechSynthesis.getVoices(); }

        document.getElementById('msform').addEventListener('submit', function(e) {
            e.preventDefault(); 
            const overlay = document.getElementById('loading-overlay');
            const text = document.getElementById('loading-text');
            const logs = document.getElementById('loading-logs');
            
            overlay.style.display = 'flex';
            hablarFemenino("Iniciando análisis del motor experto. Evaluando reglas de hardware estructural. Por favor, espere.");
            
            const steps = [
                "Cargando Base de Conocimientos...",
                "Evaluando reglas de compatibilidad física...",
                "Calculando umbrales de viabilidad térmica...",
                "Ajustando restricciones financieras...",
                "Purgando combinaciones inválidas...",
                "Generando dictamen final..."
            ];
            
            let i = 0;
            const interval = setInterval(() => {
                if(i < steps.length) {
                    logs.innerHTML += `<div class="premium-log">${steps[i]} <span style="float:right; color: var(--accent-primary); font-size:0.9rem;">[OK]</span></div>`;
                    i++;
                } else {
                    clearInterval(interval);
                    text.innerText = "ANÁLISIS COMPLETADO";
                    setTimeout(() => { document.getElementById('msform').submit(); }, 600);
                }
            }, 600); 
        });
    </script>
</body>
</html>
