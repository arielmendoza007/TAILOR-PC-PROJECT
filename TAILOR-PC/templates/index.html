<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tailor-PC | Diagnóstico</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
    :root {
        --bg:       #f0f4ff;
        --bg-card:  #ffffff;
        --text:     #0d1b2a;
        --muted:    #64748b;
        --border:   #dde4f0;
        --accent:   #2563eb;
        --accent-2: #7c3aed;
        --shadow:   rgba(37,99,235,.10);
        --mono:     'JetBrains Mono', monospace;
        --sans:     'Plus Jakarta Sans', sans-serif;
    }
    [data-theme="dark"] {
        --bg:       #080d18;
        --bg-card:  #0f172a;
        --text:     #e2e8f0;
        --muted:    #94a3b8;
        --border:   #1e293b;
        --accent:   #3b82f6;
        --accent-2: #a855f7;
        --shadow:   rgba(59,130,246,.12);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
        font-family: var(--sans);
        background: var(--bg); color: var(--text);
        min-height: 100vh; transition: background .3s, color .3s;
        font-size: 15px; line-height: 1.6;
    }

    /* ── Topbar ───────────────────────────────────── */
    .topbar {
        position: sticky; top: 0; z-index: 900;
        background: var(--bg-card); border-bottom: 1px solid var(--border);
        padding: 13px 28px;
        display: flex; align-items: center;
        box-shadow: 0 1px 20px var(--shadow);
    }
    .brand { font-weight: 800; font-size: 1.05rem; color: var(--accent); flex: 1; }
    .brand span { color: var(--text); }
    .tb-btn {
        background: transparent; color: var(--muted);
        border: 1px solid var(--border); border-radius: 9px;
        padding: 7px 16px; font-family: var(--sans);
        font-size: .82rem; font-weight: 600; cursor: pointer;
        transition: all .15s;
    }
    .tb-btn:hover { border-color: var(--accent); color: var(--accent); }

    /* ── Form card ────────────────────────────────── */
    .form-wrap { max-width: 600px; margin: 36px auto; padding: 0 16px 40px; }
    .form-card {
        background: var(--bg-card); border: 1px solid var(--border);
        border-radius: 18px; padding: 38px;
        box-shadow: 0 6px 36px var(--shadow);
    }

    /* ── Progress ─────────────────────────────────── */
    .progress-row { display: flex; gap: 6px; margin-bottom: 28px; }
    .prog-seg {
        flex: 1; height: 5px; border-radius: 3px;
        background: var(--border); transition: background .3s;
    }
    .prog-seg.done { background: var(--accent); }

    /* ── Step labels ──────────────────────────────── */
    .step-tag {
        font-family: var(--mono); font-size: .7rem; font-weight: 700;
        color: var(--accent); text-transform: uppercase; letter-spacing: 2px;
        margin-bottom: 5px;
    }
    .step-title { font-size: 1.3rem; font-weight: 800; margin-bottom: 22px; }

    /* ── Inputs ───────────────────────────────────── */
    .field-label {
        display: block; font-family: var(--mono); font-size: .72rem; font-weight: 700;
        color: var(--muted); text-transform: uppercase; letter-spacing: .6px;
        margin-bottom: 6px;
    }
    .form-ctrl, .form-sel {
        width: 100%; padding: 10px 14px;
        background: var(--bg) !important; border: 1px solid var(--border) !important;
        border-radius: 10px !important; color: var(--text) !important;
        font-family: var(--sans) !important; font-size: .9rem !important;
        outline: none; transition: border-color .2s !important;
        appearance: auto;
    }
    .form-ctrl:focus, .form-sel:focus {
        border-color: var(--accent) !important;
        box-shadow: 0 0 0 3px rgba(37,99,235,.1) !important;
    }
    .form-sel option { background: var(--bg-card); color: var(--text); }
    .field-mb { margin-bottom: 16px; }

    /* ── Switch ───────────────────────────────────── */
    .sw-row {
        display: flex; align-items: center; gap: 11px;
        padding: 12px 0; margin-bottom: 8px;
    }
    .sw-row label { font-size: .88rem; font-weight: 500; cursor: pointer; color: var(--text); }
    input[type=checkbox].form-check-input:checked {
        background-color: var(--accent) !important;
        border-color: var(--accent) !important;
    }

    /* ── Navigation buttons ───────────────────────── */
    .btn-row { display: flex; gap: 10px; margin-top: 24px; }
    .btn-next {
        background: var(--accent); color: #fff;
        border: none; border-radius: 10px;
        padding: 11px 26px; font-family: var(--sans);
        font-weight: 700; font-size: .9rem; cursor: pointer;
        transition: background .15s;
    }
    .btn-next:hover { background: var(--accent-2); }
    .btn-back {
        background: transparent; color: var(--muted);
        border: 1px solid var(--border); border-radius: 10px;
        padding: 11px 22px; font-family: var(--sans);
        font-weight: 600; font-size: .9rem; cursor: pointer;
        transition: all .15s;
    }
    .btn-back:hover { border-color: var(--accent); color: var(--accent); }
    .btn-submit {
        background: linear-gradient(135deg, var(--accent), var(--accent-2));
        color: #fff; border: none; border-radius: 10px;
        padding: 12px 30px; font-family: var(--mono);
        font-weight: 700; font-size: .88rem; cursor: pointer;
        letter-spacing: .5px;
        box-shadow: 0 4px 20px rgba(37,99,235,.35);
        transition: opacity .15s, transform .1s;
    }
    .btn-submit:hover { opacity: .9; }
    .btn-submit:active { transform: scale(.97); }

    /* ── Loading overlay ──────────────────────────── */
    #loading {
        display: none; position: fixed; inset: 0; z-index: 9999;
        background: var(--bg);
        flex-direction: column; align-items: center; justify-content: center; gap: 0;
    }
    .spin {
        width: 48px; height: 48px;
        border: 3px solid var(--border); border-top-color: var(--accent);
        border-radius: 50%; animation: spin .75s linear infinite;
        margin-bottom: 22px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #load-title {
        font-family: var(--mono); font-weight: 700; font-size: .95rem;
        color: var(--accent); letter-spacing: 2px; margin-bottom: 22px;
    }
    .log-row {
        font-family: var(--mono); font-size: .76rem;
        color: var(--muted); padding: 5px 0;
        display: flex; justify-content: space-between;
        width: 460px; max-width: 90%;
        border-bottom: 1px solid var(--border);
    }
    .log-ok { color: var(--accent); }
    </style>
</head>

<body data-theme="light">
<script>document.body.setAttribute('data-theme', localStorage.getItem('tailorTheme') || 'light');</script>

<div class="topbar">
    <div class="brand">Tailor-PC <span>Expert System</span></div>
    <button class="tb-btn" onclick="toggleTheme()">🌓 Tema</button>
</div>

<div class="form-wrap">
<form action="/diagnostico" method="POST" id="msform">
<div class="form-card">

    <!-- Progress bar -->
    <div class="progress-row" id="progress">
        <div class="prog-seg done" id="seg1"></div>
        <div class="prog-seg"      id="seg2"></div>
        <div class="prog-seg"      id="seg3"></div>
        <div class="prog-seg"      id="seg4"></div>
    </div>

    <!-- PASO 1 -->
    <div id="step1">
        <div class="step-tag">Paso 1 de 4</div>
        <div class="step-title">Recursos y Marca</div>

        <div class="field-mb">
            <label class="field-label">Presupuesto máximo (MXN)</label>
            <input type="number" name="presupuesto" class="form-ctrl"
                   placeholder="Ej. 25000" min="3000" required>
        </div>
        <div class="field-mb">
            <label class="field-label">Preferencia de Procesador</label>
            <select name="marca_cpu" class="form-sel">
                <option value="indistinto">Mejor costo/beneficio (Recomendado)</option>
                <option value="intel">Prefiero Intel Core</option>
                <option value="amd">Prefiero AMD Ryzen</option>
            </select>
        </div>
        <div class="btn-row">
            <button type="button" class="btn-next" onclick="goStep(2)">Siguiente →</button>
        </div>
    </div>

    <!-- PASO 2 -->
    <div id="step2" style="display:none">
        <div class="step-tag">Paso 2 de 4</div>
        <div class="step-title">Enfoque Táctico</div>

        <div class="row g-3 mb-0">
            <div class="col-md-6 field-mb">
                <label class="field-label">Uso Principal</label>
                <select name="uso" class="form-sel">
                    <option value="gaming">Gaming / Streaming</option>
                    <option value="render">Renderizado / 3D</option>
                    <option value="ofimatica">Ofimática / Estudio</option>
                </select>
            </div>
            <div class="col-md-6 field-mb">
                <label class="field-label">Estética del Equipo</label>
                <select name="estilo_rgb" class="form-sel">
                    <option value="minimalista">Minimalista (Sin RGB)</option>
                    <option value="rgb">Gamer (RGB Completo)</option>
                </select>
            </div>
        </div>
        <div class="btn-row">
            <button type="button" class="btn-back" onclick="goStep(1)">← Atrás</button>
            <button type="button" class="btn-next" onclick="goStep(3)">Siguiente →</button>
        </div>
    </div>

    <!-- PASO 3 -->
    <div id="step3" style="display:none">
        <div class="step-tag">Paso 3 de 4</div>
        <div class="step-title">Infraestructura</div>

        <div class="row g-3">
            <div class="col-md-6 field-mb">
                <label class="field-label">Conectividad</label>
                <select name="wifi" class="form-sel">
                    <option value="Sí">Wi-Fi Integrado</option>
                    <option value="NO">Ethernet (Cable)</option>
                </select>
            </div>
            <div class="col-md-6 field-mb">
                <label class="field-label">Tamaño del Gabinete</label>
                <select name="size" class="form-sel">
                    <option value="ATX">ATX (Estándar)</option>
                    <option value="Micro-ATX">Micro-ATX (Compacto)</option>
                </select>
            </div>
        </div>
        <div class="sw-row">
            <input class="form-check-input" type="checkbox" name="streaming" id="streaming">
            <label for="streaming">Streaming simultáneo activo</label>
        </div>
        <div class="btn-row">
            <button type="button" class="btn-back" onclick="goStep(2)">← Atrás</button>
            <button type="button" class="btn-next" onclick="goStep(4)">Siguiente →</button>
        </div>
    </div>

    <!-- PASO 4 -->
    <div id="step4" style="display:none">
        <div class="step-tag">Paso 4 de 4</div>
        <div class="step-title">Escalabilidad</div>

        <div class="row g-3">
            <div class="col-md-6 field-mb">
                <label class="field-label">Plataforma Futura</label>
                <select name="longevidad" class="form-sel">
                    <option value="Sí">Plataforma Nueva (DDR5 / AM5)</option>
                    <option value="NO">Máximo rendimiento actual (DDR4)</option>
                </select>
            </div>
            <div class="col-md-6 field-mb">
                <label class="field-label">Audio</label>
                <select name="audio" class="form-sel">
                    <option value="estandar">Audio Estándar</option>
                    <option value="pro">Audio Alta Fidelidad</option>
                </select>
            </div>
        </div>
        <div class="btn-row">
            <button type="button" class="btn-back" onclick="goStep(3)">← Atrás</button>
            <button type="submit" class="btn-submit">⚡ EJECUTAR MOTOR RETE</button>
        </div>
    </div>

</div><!-- /form-card -->
</form>
</div>

<!-- Loading -->
<div id="loading">
    <div class="spin"></div>
    <div id="load-title">SINTETIZANDO DATOS</div>
    <div id="load-logs"></div>
</div>

<script>
    function toggleTheme() {
        const next = document.body.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
        document.body.setAttribute('data-theme', next);
        localStorage.setItem('tailorTheme', next);
    }

    function goStep(n) {
        for (let i = 1; i <= 4; i++) {
            document.getElementById('step' + i).style.display = i === n ? 'block' : 'none';
            document.getElementById('seg' + i).classList.toggle('done', i <= n);
        }
    }

    document.getElementById('msform').addEventListener('submit', function(e) {
        e.preventDefault();
        document.getElementById('loading').style.display = 'flex';
        const steps = [
            'Cargando base de conocimientos...',
            'Evaluando reglas de compatibilidad física...',
            'Calculando umbrales de viabilidad térmica...',
            'Ajustando restricciones financieras...',
            'Purgando combinaciones inválidas...',
            'Generando dictamen final...'
        ];
        let i = 0;
        const logs = document.getElementById('load-logs');
        const iv = setInterval(() => {
            if (i < steps.length) {
                const row = document.createElement('div');
                row.className = 'log-row';
                row.innerHTML = `<span>${steps[i]}</span><span class="log-ok">[OK]</span>`;
                logs.appendChild(row);
                i++;
            } else {
                clearInterval(iv);
                document.getElementById('load-title').textContent = 'ANÁLISIS COMPLETADO';
                setTimeout(() => this.submit(), 600);
            }
        }, 600);
    });
</script>
</body>
</html>
