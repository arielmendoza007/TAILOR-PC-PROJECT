<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Tailor PC | Expert System</title>
    <style>
        :root { --accent: #3b82f6; --bg: #060b1a; }
        body {
            background: var(--bg); color: #f8fafc; font-family: 'Segoe UI', sans-serif;
            margin: 0; display: flex; justify-content: center; align-items: center;
            height: 100vh; overflow: hidden;
        }
        .container {
            width: 85%; max-width: 1000px; padding: 60px;
            background: rgba(11, 27, 61, 0.6); backdrop-filter: blur(12px);
            border: 1px solid rgba(59, 130, 246, 0.3); border-radius: 8px;
        }
        .grid { display: grid; grid-template-columns: 1fr 1.3fr; gap: 60px; }
        .hero h1 { font-size: 5rem; margin: 0; font-weight: 800; color: #fff; line-height: 0.9; }
        .hero h1 span { color: var(--accent); }
        .card {
            border-left: 3px solid var(--accent); background: rgba(255,255,255,0.03);
            padding: 20px 30px; margin-bottom: 20px;
        }
        .card h3 { color: var(--accent); font-size: 0.8rem; letter-spacing: 2px; margin: 0 0 10px; }
        .btn {
            background: var(--accent); color: white; padding: 18px 50px;
            text-decoration: none; font-weight: bold; border-radius: 4px;
            display: inline-block; transition: 0.3s;
        }
        .btn:hover { background: #2563eb; transform: translateY(-2px); }
    </style>
</head>
<body>
    <div class="container">
        <div class="grid">
            <div class="hero">
                <h1>T<span>tailor</span><br>PC</h1>
                <p style="color: #94a3b8; margin-top: 20px;">UAEH ICBI • Sistemas Basados en Conocimiento</p>
            </div>
            <div>
                <div class="card">
                    <h3>OBJETIVO</h3>
                    <p>Optimización de hardware mediante motor de inferencia RETE.</p>
                </div>
                <div class="card">
                    <h3>METODOLOGÍA</h3>
                    <p>Validación de compatibilidad física y eficiencia energética.</p>
                </div>
                <a href="/diagnostico-inicio" class="btn">RUN DIAGNOSTIC_</a>
            </div>
        </div>
    </div>
</body>
</html>
